<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>{% block title %}Task Manager Pro{% endblock %}</title>

  <!-- Bootstrap CSS -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"/>

  <!-- Your CSS -->
  <link href="{{ url_for('static', filename='style.css') }}" rel="stylesheet"/>
</head>

<body class="bg-light">

  <nav class="navbar navbar-dark bg-dark px-4 d-flex justify-content-between">
    <span class="navbar-brand fw-bold">Task Manager Pro</span>

    {% if current_user.is_authenticated %}
    <div class="d-flex gap-2 align-items-center">

      <!-- ✅ ADMIN LINK (only visible to admins) -->
      {% if current_user.role == "admin" and request.path != "/admin" %}
        <a href="/admin" class="btn btn-outline-info btn-sm">Admin</a>
        <a href="/" class="navbar-brand fw-bold text-decoration-none text-white">Task Manager Pro</a>
      {% endif %}

      <button id="themeToggle" class="btn btn-outline-light btn-sm" title="Toggle theme">
          🌙
      </button>

      <a href="/logout" class="btn btn-outline-light btn-sm">
          Logout
      </a>
    </div>
    {% endif %}
  </nav>

  <div class="container mt-4">
    {% include "messages.html" %}
    {% block content %}{% endblock %}
  </div>

  <!-- Bootstrap JS bundle -->
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

  {% block scripts %}{% endblock %}
</body>
</html>
